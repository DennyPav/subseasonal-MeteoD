name: ERA5 – Tutti gli anni

on:
  workflow_dispatch:
    inputs:
      parallel:
        description: "Esegui in parallelo? (true/false)"
        required: false
        default: "false"
        type: string

jobs:
  # Matrice: ogni anno diventa un job separato
  era5-all:
    strategy:
      matrix:
        year:
          - "2005"
          - "2006"
          - "2007"
          - "2008"
          - "2009"
          - "2010"
          - "2011"
          - "2012"
          - "2013"
          - "2014"
          - "2015"
          - "2016"
          - "2017"
          - "2018"
          - "2019"
          - "2020"
          - "2021"
          - "2022"
          - "2023"
          - "2024"
          - "2025"
      max-parallel: 3          # max 3 anni contemporaneamente (evita rate limit CDS)
      fail-fast: false          # se un anno fallisce, gli altri continuano

    uses: ./.github/workflows/download_year.yml
    with:
      year: ${{ matrix.year }}
    secrets: inherit            # passa CDSAPI_URL e CDSAPI_KEY automaticamente
